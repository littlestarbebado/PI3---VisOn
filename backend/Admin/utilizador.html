<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VIS ON – Gestão de Utilizadores</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="utilizador.css"/>
</head>
<body>

  <main class="main" style="margin-left: 0;">

    <!-- Page Header -->
    <div class="page-header utilizadores-header">
      <div>
        <h1>Gestão de Utilizadores</h1>
        <p>Criar e gerir utilizadores do sistema</p>
      </div>
      <div class="header-actions">
        <button class="btn btn-primary">
          <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <circle cx="9" cy="7" r="4"/>
            <path d="M2 21v-2a4 4 0 014-4h6a4 4 0 014 4v2"/>
            <path d="M19 8v6m3-3h-6"/>
          </svg>
          Criar Gestor
        </button>
        <button class="btn btn-secondary">
          <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <circle cx="9" cy="7" r="4"/>
            <path d="M2 21v-2a4 4 0 014-4h6a4 4 0 014 4v2"/>
            <path d="M19 8v6m3-3h-6"/>
          </svg>
          Criar Cliente
        </button>
      </div>
    </div>

    <!-- Users Card -->
    <div class="card">
      <div class="card-title">Utilizadores Registados</div>

      <div class="user-list">

        <!-- Administrador -->
        <div class="user-item">
          <div class="user-avatar">
            <svg fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
          </div>
          <div class="user-info">
            <div class="user-name-row">
              <span class="user-name">Administrador</span>
              <span class="badge badge-admin">Admin</span>
            </div>
            <div class="user-email">admin@cybersec.com</div>
          </div>
          <!-- Admin has no action icons -->
        </div>

        <!-- Gestor Silva -->
        <div class="user-item">
          <div class="user-avatar">
            <svg fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
          </div>
          <div class="user-info">
            <div class="user-name-row">
              <span class="user-name">Gestor Silva</span>
              <span class="badge badge-gestor">Gestor</span>
            </div>
            <div class="user-email">gestor@cybersec.com</div>
            <div class="user-phone">+351 912 345 678</div>
          </div>
          <div class="user-actions">
            <button class="icon-btn icon-lock" title="Bloquear">
              <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0110 0v4"/>
              </svg>
            </button>
            <button class="icon-btn icon-delete" title="Eliminar">
              <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
                <path d="M10 11v6M14 11v6"/>
                <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- João Cliente -->
        <div class="user-item">
          <div class="user-avatar">
            <svg fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
          </div>
          <div class="user-info">
            <div class="user-name-row">
              <span class="user-name">João Cliente</span>
              <span class="badge badge-cliente">Cliente</span>
            </div>
            <div class="user-email">cliente@empresa.com</div>
            <div class="user-phone">+351 913 456 789</div>
            <div class="user-company">TechCorp Solutions</div>
          </div>
          <div class="user-actions">
            <button class="icon-btn icon-lock" title="Bloquear">
              <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0110 0v4"/>
              </svg>
            </button>
            <button class="icon-btn icon-delete" title="Eliminar">
              <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
                <path d="M10 11v6M14 11v6"/>
                <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
              </svg>
            </button>
          </div>
        </div>

      </div>
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
